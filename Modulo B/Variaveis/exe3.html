<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variaveis</title>
    <style>
        body{
            background-color: rgb(18, 79, 194);
            color: white;
            font-weight: bold;
        }

        h2{
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>ola, mundo!</h1>
    <p>ja me livrei da maldição</p>
    <h2>aprendendo variaveis</h2>
    <script>
        var num1 = Number.parseInt(prompt("digite um numero"))
        var num2 = Number.parseInt(prompt("digite um outro numero"))
        var soma = num1 + num2
        alert(`o valor da soma entre ${num1} e ${num2} e igual a ${soma} `)
    </script>
</body>
</html>
