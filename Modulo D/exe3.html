<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrangeiros</title>
</head>
<body>
    <label for="pais">Qual e seu pais</label>
    <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="verificarNacionalidade()">
    <div id="res"></div>
    <script>
        function verificarNacionalidade(){
            var pais = document.getElementById('txtpais')
            var res = document.getElementById('res')
            if(pais != 'mz'){
                res.innerHTML = '<trong>Estrangeiro</strong>'
            }else{
                res.innerHTML = '<trong>Mocambicano</strong>'
            }
        }
    </script>
</body>
</html>
