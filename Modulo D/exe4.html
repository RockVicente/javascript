<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do dia</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }

        body{
            width: 100vw;
            height: 100vh;
            background-color: antiquewhite;
        }

        div{
            padding: 20px;
        }

        .container-principal{
            display: grid;
            grid-template-columns: repeat(3,auto);
            grid-template-rows: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            justify-items: center;

        }
        
        .container-principal h1{
            grid-area: 1/2/2/3;
            align-items: center;
            font-family:Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
        
        }

        .container-secundario{
            grid-area: 2/2;
            display: grid;
            justify-items: center;
            background-color:white;
            width: 400px;
            height: 400px;
            border-radius: 10px;
            box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.271);
        }
        
        .container-secundario p{
            font-size: 18px;
        }

        .container-secundario .circulo-imagem{
            background: aqua url(Maputo\ city\ 🏙.jpeg) center center fixed no-repeat;
            width: 200px;
            height: 200px;
            border-radius: 50%;
        }

        .container-principal a{
            grid-area: 3/2;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container-principal">
        <h1>Hora do Dia</h1>
        <div class="container-secundario">
            <p class="msg">agora sao</p>
            <div class="circulo-imagem">

            </div>
        </div>
        <a href="https://www.instagram.com/rock_vicente03/?__pwa=1#">
            @Meu Instagram
        </a>
    </div>

    <script>
        var horaSistema = new Date()
        var hora = horaSistema.getHours()
        var msg = document.getElementsByClassName('msg')
        
        if(hora < 12){
            msg = ''
        }
    </script>
</body>
</html>
