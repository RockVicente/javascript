<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador Idade</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>

    <section>

        <div class="principal">
            
            <div class="anoNasc">
                <label for="aNasc">Ano de Nascimento</label>
                <input type="number" name="ano" id="aNasc">
            </div>
            
            <div>
            
                <p>Sexo:
                    <input type="radio" name="sex" id="masc" checked>
                    <label for="masc">Masculino</label>
                    <input type="radio" name="sex" id="fem">
                    <label for="fem">Feminino</label>
                </p>
            
                <div>
                    <input class="btn" type="submit" value="Verificar" onclick="verificar()">
                </div>
            </div>
            
            <div id="res">
                aqui vai aparecer o resultado!
            </div>
        
        </div>
    
    </section>
    
    <footer>
        <p>&COPY; <a href="https://www.instagram.com/rock_vicente03/?__pwa=1#">Rock Vicente</a></p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
